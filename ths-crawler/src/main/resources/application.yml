server:
  port: 8100

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ths_crawler?useSSL=false&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Flyway 数据库版本化管控
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true
    encoding: UTF-8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto

# ===== 同花顺爬虫配置 =====
ths:
  # 数据源切换：playwright(当前-推荐) / okhttp(已失效-401) / akshare(已损坏)
  fetcher:
    impl: playwright
    sector-flow: akshare

  # AKShare配置
  akshare:
    python-path: python3
    script-path: scripts/fetch_sector_flow.py
    timeout: 60

  # OkHttp配置（已失效-401，保留备用）
  okhttp:
    connect-timeout: 10
    read-timeout: 30
    retry-count: 3
    request-delay-min: 500
    request-delay-max: 1500

  # Playwright浏览器自动化配置（P0-01）
  playwright:
    url: "http://data.10jqka.com.cn/funds/hyzjl/"
    headless: true              # 云电脑无GUI，必须headless
    timeout: 30000              # 页面加载超时(ms)
    page-wait-ms: 2000          # 翻页后等待DOM渲染(ms)
    max-pages: 4                # 最大翻页数（4页≈90行业）
    max-retry: 3                # 单页最大重试次数
    retry-delay-base: 1000      # 退避基数(ms)

  # 趋势计算配置（V2新增）
  trend:
    # 有效样本最低比例（周期 × 0.8）
    min-sample-ratio: 0.8
    # R²过滤阈值（模拟数据R²普遍偏低，真实数据可调高到0.3-0.4）
    r-squared-threshold: 0.1

  # 定时任务Cron（默认工作日15:30收盘后执行）
  cron:
    sector-capital-flow: "0 30 15 ? * MON-FRI"
    # V2新增：行业资金采集 / 趋势计算 / 异动信号 / 数据校验
    industry-flow-collect: "0 30 15 ? * MON-FRI"
    industry-trend-calc: "0 30 16 ? * MON-FRI"
    industry-anomaly-signal: "0 0 17 ? * MON-FRI"
    industry-data-verify: "0 0 9 ? * MON-FRI"

  # Redis TTL配置（天）
  redis:
    raw-ttl: 7
    clean-ttl: 30

  # 爬虫调试配置
  crawler:
    debug-html: false  # 测试时改为 true，保存每页表格原始 HTML 到 logs/crawler/

  # 存储配置
  storage:
    async-pool-size: 4
    save-raw-json: true

logging:
  level:
    com.ths.crawler: DEBUG
